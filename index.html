<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cascata Financeira — Regra 50/30/20</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,600;9..144,800&family=Manrope:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Background atmosférico -->
  <div class="bg-noise" aria-hidden="true"></div>
  <div class="bg-glow bg-glow--top" aria-hidden="true"></div>
  <div class="bg-glow bg-glow--bottom" aria-hidden="true"></div>

  <main class="app">

    <!-- HEADER -->
    <header class="hero">
      <div class="hero__brand">
        <span class="hero__eyebrow">Sistema · 50/30/20 ponderado</span>
        <h1 class="hero__title">Cascata <em>Financeira</em></h1>
      </div>

      <div class="hero__salary" id="salaryCard">
        <label class="hero__label" for="salaryInput">Salário base</label>
        <div class="hero__input-wrap">
          <span class="hero__currency">R$</span>
          <input
            id="salaryInput"
            type="text"
            inputmode="decimal"
            class="hero__input"
            placeholder="0,00"
          />
        </div>
        <button id="salarySave" class="hero__save" type="button">Atualizar</button>
      </div>
    </header>

    <!-- POTE CENTRAL (SALÁRIO) -->
    <section class="central" aria-label="Pote central com salário total">
      <div class="central__pot" id="centralPot" style="--fill: 0%;">
        <div class="central__lip"></div>
        <div class="central__liquid">
          <svg class="central__wave" viewBox="0 0 600 40" preserveAspectRatio="none" aria-hidden="true">
            <path
              d="M0,20 Q150,0 300,20 T600,20 L600,40 L0,40 Z"
              fill="currentColor"
              opacity="0.6"
            >
              <animateTransform
                attributeName="transform"
                type="translate"
                from="0 0" to="-300 0"
                dur="6s" repeatCount="indefinite"
              />
            </path>
            <path
              d="M0,25 Q150,5 300,25 T600,25 L600,40 L0,40 Z"
              fill="currentColor"
              opacity="0.9"
            >
              <animateTransform
                attributeName="transform"
                type="translate"
                from="-300 0" to="0 0"
                dur="8s" repeatCount="indefinite"
              />
            </path>
          </svg>
        </div>
        <div class="central__content">
          <span class="central__caption">Líquido total</span>
          <strong class="central__value" id="centralValue">R$ 0,00</strong>
        </div>
      </div>

      <!-- Canos descendentes em SVG -->
      <svg class="pipes" viewBox="0 0 1000 160" preserveAspectRatio="none" aria-hidden="true">
        <path class="pipes__path" d="M500,0 L500,40 Q500,80 200,120 L200,160" />
        <path class="pipes__path" d="M500,0 L500,80 L500,160" />
        <path class="pipes__path" d="M500,0 L500,40 Q500,80 800,120 L800,160" />
      </svg>
    </section>

    <!-- TRÊS ÁREAS -->
    <section class="areas">

      <article class="area area--necessidades" data-area="NECESSIDADES">
        <header class="area__header">
          <span class="area__pct">50%</span>
          <h2 class="area__name">Necessidades</h2>
          <span class="area__total" id="totalNECESSIDADES">R$ 0,00</span>
        </header>

        <div class="area__pots" id="potsNECESSIDADES"></div>

        <button class="area__add" data-add="NECESSIDADES" type="button">
          <span>+</span> adicionar pote
        </button>
      </article>

      <article class="area area--desejos" data-area="DESEJOS">
        <header class="area__header">
          <span class="area__pct">30%</span>
          <h2 class="area__name">Desejos</h2>
          <span class="area__total" id="totalDESEJOS">R$ 0,00</span>
        </header>

        <div class="area__pots" id="potsDESEJOS"></div>

        <button class="area__add" data-add="DESEJOS" type="button">
          <span>+</span> adicionar pote
        </button>
      </article>

      <article class="area area--investimentos" data-area="INVESTIMENTOS">
        <header class="area__header">
          <span class="area__pct">20%</span>
          <h2 class="area__name">Investimentos</h2>
          <span class="area__total" id="totalINVESTIMENTOS">R$ 0,00</span>
        </header>

        <div class="area__pots" id="potsINVESTIMENTOS"></div>

        <button class="area__add" data-add="INVESTIMENTOS" type="button">
          <span>+</span> adicionar pote
        </button>
      </article>

    </section>

    <footer class="foot">
      <span id="statusMsg" class="foot__status">Pronto.</span>
      <span class="foot__hint">Os pesos são relativos dentro de cada área. Edite e veja a redistribuição em tempo real.</span>
    </footer>
  </main>

  <!-- MODAL: adicionar/editar pote -->
  <div class="modal" id="modal" hidden>
    <div class="modal__backdrop" data-close></div>
    <div class="modal__card" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <button class="modal__close" type="button" data-close aria-label="Fechar">×</button>
      <h3 id="modalTitle" class="modal__title">Novo pote</h3>
      <span class="modal__subtitle" id="modalSubtitle">Necessidades</span>

      <form id="modalForm" class="modal__form">
        <input type="hidden" id="formId" />
        <input type="hidden" id="formArea" />

        <label class="field">
          <span class="field__label">Nome</span>
          <input id="formNome" type="text" class="field__input" required maxlength="40" />
        </label>

        <label class="field">
          <span class="field__label">Peso <small>(quanto maior, mais R$ recebe na área)</small></span>
          <input id="formPeso" type="number" class="field__input" min="0.1" step="0.1" value="1" required />
        </label>

        <label class="field">
          <span class="field__label">Ícone <small>(emoji opcional)</small></span>
          <input id="formIcone" type="text" class="field__input" maxlength="2" placeholder="🪙" />
        </label>

        <div class="modal__actions">
          <button type="button" class="btn btn--ghost" id="formDelete" hidden>Excluir</button>
          <button type="submit" class="btn btn--primary" id="formSave">Salvar</button>
        </div>
      </form>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
