<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cascata · Regra 50/30/20</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Instrument+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500;600&display=swap"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="vignette" aria-hidden="true"></div>

  <main class="app">

    <!-- HEADER -->
    <header class="topbar">
      <div class="brand">
        <span class="brand__dot"></span>
        <span class="brand__name">cascata</span>
        <span class="brand__tag">·  50 / 30 / 20</span>
      </div>

      <div class="salary">
        <span class="salary__label">salário base</span>
        <div class="salary__input-wrap">
          <span class="salary__currency">R$</span>
          <input
            id="salaryInput"
            type="text"
            inputmode="decimal"
            class="salary__input"
            placeholder="0,00"
          />
          <button id="salarySave" class="salary__save" type="button" aria-label="Atualizar salário">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
          </button>
        </div>
      </div>
    </header>

    <!-- POTE CENTRAL · Salário líquido total -->
    <section class="centerpiece">
      <div class="centerpiece__stage">
        <div class="jar jar--central" data-jar="CENTRAL">
          <div class="jar__lid"></div>
          <div class="jar__neck"></div>
          <div class="jar__body">
            <div class="jar__coins"></div>
            <div class="jar__shine"></div>
            <div class="jar__shine jar__shine--right"></div>
            <div class="jar__rim"></div>
          </div>
          <div class="jar__shadow"></div>
        </div>
      </div>

      <div class="centerpiece__label">
        <span class="centerpiece__eyebrow">líquido a distribuir</span>
        <span class="centerpiece__value" id="centralValue">R$ 0,00</span>
      </div>

      <!-- Canos descendentes -->
      <svg class="pipes" viewBox="0 0 600 90" preserveAspectRatio="none" aria-hidden="true">
        <path class="pipes__path pipes__path--needs"    d="M300,0 C300,30 100,40 100,90" />
        <path class="pipes__path pipes__path--wants"    d="M300,0 L300,90" />
        <path class="pipes__path pipes__path--invest"   d="M300,0 C300,30 500,40 500,90" />
      </svg>
    </section>

    <!-- ÁREAS -->
    <section class="areas">

      <article class="area area--needs" data-area="NECESSIDADES" style="--coin-count: 25;">
        <header class="area__head">
          <span class="area__pct">50%</span>
          <h2 class="area__name">Necessidades</h2>
          <span class="area__total" id="totalNECESSIDADES">R$ 0,00</span>
        </header>

        <div class="jar-stage">
          <div class="jar" data-jar="NECESSIDADES">
            <div class="jar__lid"></div>
            <div class="jar__neck"></div>
            <div class="jar__body">
              <div class="jar__coins"></div>
              <div class="jar__shine"></div>
              <div class="jar__shine jar__shine--right"></div>
              <div class="jar__rim"></div>
            </div>
            <div class="jar__shadow"></div>
          </div>
        </div>

        <div class="sublist" id="potsNECESSIDADES"></div>

        <button class="addbtn" data-add="NECESSIDADES" type="button">
          <span class="addbtn__icon">+</span>
          <span>Adicionar pote</span>
        </button>
      </article>

      <article class="area area--wants" data-area="DESEJOS" style="--coin-count: 15;">
        <header class="area__head">
          <span class="area__pct">30%</span>
          <h2 class="area__name">Desejos</h2>
          <span class="area__total" id="totalDESEJOS">R$ 0,00</span>
        </header>

        <div class="jar-stage">
          <div class="jar" data-jar="DESEJOS">
            <div class="jar__lid"></div>
            <div class="jar__neck"></div>
            <div class="jar__body">
              <div class="jar__coins"></div>
              <div class="jar__shine"></div>
              <div class="jar__shine jar__shine--right"></div>
              <div class="jar__rim"></div>
            </div>
            <div class="jar__shadow"></div>
          </div>
        </div>

        <div class="sublist" id="potsDESEJOS"></div>

        <button class="addbtn" data-add="DESEJOS" type="button">
          <span class="addbtn__icon">+</span>
          <span>Adicionar pote</span>
        </button>
      </article>

      <article class="area area--invest" data-area="INVESTIMENTOS" style="--coin-count: 10;">
        <header class="area__head">
          <span class="area__pct">20%</span>
          <h2 class="area__name">Investimentos</h2>
          <span class="area__total" id="totalINVESTIMENTOS">R$ 0,00</span>
        </header>

        <div class="jar-stage">
          <div class="jar" data-jar="INVESTIMENTOS">
            <div class="jar__lid"></div>
            <div class="jar__neck"></div>
            <div class="jar__body">
              <div class="jar__coins"></div>
              <div class="jar__shine"></div>
              <div class="jar__shine jar__shine--right"></div>
              <div class="jar__rim"></div>
            </div>
            <div class="jar__shadow"></div>
          </div>
        </div>

        <div class="sublist" id="potsINVESTIMENTOS"></div>

        <button class="addbtn" data-add="INVESTIMENTOS" type="button">
          <span class="addbtn__icon">+</span>
          <span>Adicionar pote</span>
        </button>
      </article>

    </section>

    <footer class="footbar">
      <span id="statusMsg" class="footbar__status">Pronto</span>
      <span class="footbar__hint">Clique em um pote para editar · Pesos relativos dentro da área</span>
    </footer>
  </main>

  <!-- MODAL -->
  <div class="modal" id="modal" hidden>
    <div class="modal__backdrop" data-close></div>
    <div class="modal__card" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <button class="modal__close" type="button" data-close aria-label="Fechar">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>

      <span class="modal__eyebrow" id="modalSubtitle">Necessidades</span>
      <h3 id="modalTitle" class="modal__title">Novo pote</h3>

      <form id="modalForm" class="modal__form">
        <input type="hidden" id="formId" />
        <input type="hidden" id="formArea" />

        <label class="field">
          <span class="field__label">Nome do pote</span>
          <input id="formNome" type="text" class="field__input" required maxlength="40" placeholder="Ex.: Aluguel" />
        </label>

        <label class="field">
          <span class="field__label">
            Peso
            <small>quanto maior o peso, mais R$ esse pote recebe</small>
          </span>
          <input id="formPeso" type="number" class="field__input" min="0.1" step="0.1" value="1" required />
        </label>

        <label class="field">
          <span class="field__label">
            Ícone <small>emoji opcional</small>
          </span>
          <input id="formIcone" type="text" class="field__input" maxlength="2" placeholder="🪙" />
        </label>

        <div class="modal__actions">
          <button type="button" class="btn btn--ghost" id="formDelete" hidden>Excluir</button>
          <button type="submit" class="btn btn--primary" id="formSave">Salvar</button>
        </div>
      </form>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
